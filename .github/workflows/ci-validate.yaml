name: ci-validate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dagger-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Rush Delivery validation
        uses: BootstrapLaboratory/rush-delivery@v0.3.3
        with:
          entrypoint: validate
