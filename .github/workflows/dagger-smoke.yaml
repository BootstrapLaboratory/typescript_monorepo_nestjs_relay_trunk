name: dagger-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DAGGER_NO_NAG: "1"
  RUSH_DELIVERY_MODULE: github.com/BootstrapLaboratory/rush-delivery@v0.2.0

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dagger CLI
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="${RUNNER_TEMP}/bin" sh
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Call Dagger bootstrap function
        run: dagger -m "${RUSH_DELIVERY_MODULE}" call ping
