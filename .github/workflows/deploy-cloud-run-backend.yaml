name: deploy-cloud-run-backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-cloud-run-backend.yaml
      - .github/actions/cached-install/**
      - apps/server/**
      - common/**
      - package.json
      - package-lock.json
      - rush.json
      - nx.json

permissions:
  contents: read

env:
  CLOUD_RUN_REGION: europe-west4
  NODE_VERSION: "24"

concurrency:
  group: deploy-cloud-run-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    if: |
      vars.GCP_PROJECT_ID != '' &&
      vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
      vars.GCP_SERVICE_ACCOUNT != '' &&
      vars.GCP_ARTIFACT_REGISTRY_REPOSITORY != '' &&
      vars.CLOUD_RUN_SERVICE != '' &&
      vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT != '' &&
      vars.CLOUD_RUN_CORS_ORIGIN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Confirm required Secret Manager entries are readable
        run: |
          for secret_name in DATABASE_URL DATABASE_URL_DIRECT REDIS_URL; do
            # Validate the latest version can be accessed with the
            # Secret Manager Secret Accessor role granted by sync-secrets.sh.
            gcloud secrets versions access latest \
              --secret "${secret_name}" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              > /dev/null
          done

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Load direct database URL for migrations
        run: |
          delimiter="$(uuidgen)"
          {
            echo "DATABASE_URL_DIRECT<<${delimiter}"
            gcloud secrets versions access latest \
              --secret=DATABASE_URL_DIRECT \
              --project "${{ vars.GCP_PROJECT_ID }}"
            printf '\n%s\n' "${delimiter}"
          } >> "${GITHUB_ENV}"

      - name: Run production database migrations
        working-directory: apps/server
        env:
          NODE_ENV: production
          DATABASE_URL_DIRECT: ${{ env.DATABASE_URL_DIRECT }}
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "true"
          DATABASE_SSL_REJECT_UNAUTHORIZED: "false"
        run: npm run migration:run

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        env:
          IMAGE_NAME: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
        run: |
          docker build --pull -f apps/server/Dockerfile -t "${IMAGE_NAME}" .
          docker push "${IMAGE_NAME}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"

      - id: deploy
        name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ env.CLOUD_RUN_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_NAME }}
          env_vars: |-
            NODE_ENV=production
            HOST=0.0.0.0
            GRAPHQL_PATH=/graphql
            PUBSUB_DRIVER=redis
            DATABASE_SYNCHRONIZE=false
            DATABASE_SSL=true
            DATABASE_SSL_REJECT_UNAUTHORIZED=false
            CORS_ORIGIN=${{ vars.CLOUD_RUN_CORS_ORIGIN }}
          secrets: |-
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
          flags: >-
            --port=3000
            --service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
            --no-invoker-iam-check
            --min-instances=0
            --max-instances=3
            --concurrency=20
            --timeout=3600

      - name: Show deployed backend URL
        run: echo "${{ steps.deploy.outputs.url }}"
