name: ci-release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_server:
        description: Force a backend deploy even if Rush does not detect server impact.
        required: false
        default: false
        type: boolean
      force_webapp:
        description: Force a webapp deploy even if Rush does not detect webapp impact.
        required: false
        default: false
        type: boolean
      server_base_sha:
        description: Optional git ref or SHA to compare against for backend deploy detection.
        required: false
        type: string
      webapp_base_sha:
        description: Optional git ref or SHA to compare against for webapp deploy detection.
        required: false
        type: string

permissions:
  contents: read

env:
  CLOUD_RUN_REGION: europe-west4
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      any_scope: ${{ steps.plan.outputs.any_scope }}
      pr_base_sha: ${{ steps.plan.outputs.pr_base_sha }}
      pr_affected_projects_json: ${{ steps.plan.outputs.pr_affected_projects_json }}
      server_base_sha: ${{ steps.plan.outputs.server_base_sha }}
      webapp_base_sha: ${{ steps.plan.outputs.webapp_base_sha }}
      server_affected_projects_json: ${{ steps.plan.outputs.server_affected_projects_json }}
      webapp_affected_projects_json: ${{ steps.plan.outputs.webapp_affected_projects_json }}
      validate_server: ${{ steps.plan.outputs.validate_server }}
      validate_webapp: ${{ steps.plan.outputs.validate_webapp }}
      deploy_server: ${{ steps.plan.outputs.deploy_server }}
      deploy_webapp: ${{ steps.plan.outputs.deploy_webapp }}
      release_targets: ${{ steps.plan.outputs.release_targets }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch remote tags
        run: git fetch --force --tags origin

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - id: plan
        name: Compute Rush release plan
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          FORCE_SERVER: ${{ inputs.force_server || false }}
          FORCE_WEBAPP: ${{ inputs.force_webapp || false }}
          SERVER_BASE_SHA_OVERRIDE: ${{ inputs.server_base_sha || '' }}
          WEBAPP_BASE_SHA_OVERRIDE: ${{ inputs.webapp_base_sha || '' }}
        run: node scripts/ci/compute-rush-plan.mjs

  validate:
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.any_scope == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatdb
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatuser -d chatdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Verify the committed GraphQL contract snapshot
        if: needs.detect.outputs.validate_server == 'true'
        run: |
          npm --prefix apps/server run graphql:schema

          if ! git diff --exit-code -- libs/api/schema.gql; then
            echo "GraphQL contract drift detected." >&2
            echo "Regenerate and commit libs/api/schema.gql before merging." >&2
            git --no-pager diff -- libs/api/schema.gql
            exit 1
          fi

      - name: Lint affected Rush projects
        run: |
          node common/scripts/install-run-rush.js lint \
            --from "git:${{ needs.detect.outputs.pr_base_sha }}"

      - name: Test affected Rush projects
        run: |
          node common/scripts/install-run-rush.js test \
            --from "git:${{ needs.detect.outputs.pr_base_sha }}"

      - name: Build affected Rush projects
        run: |
          node common/scripts/install-run-rush.js build \
            --from "git:${{ needs.detect.outputs.pr_base_sha }}"

      - name: Run production-like database migrations
        if: needs.detect.outputs.validate_server == 'true'
        working-directory: apps/server
        env:
          NODE_ENV: production
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: chatdb
          DATABASE_USER: chatuser
          DATABASE_PASSWORD: chatpass
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
        run: |
          export DATABASE_URL="postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
          npm run migration:run

      - name: Start backend with production-like env
        if: needs.detect.outputs.validate_server == 'true'
        working-directory: apps/server
        env:
          NODE_ENV: production
          HOST: 127.0.0.1
          PORT: "3100"
          GRAPHQL_PATH: /graphql
          CORS_ORIGIN: http://localhost:5173
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: chatdb
          DATABASE_USER: chatuser
          DATABASE_PASSWORD: chatpass
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
          PUBSUB_DRIVER: redis
          REDIS_URL: redis://127.0.0.1:6379
          LOG_VERBOSE_PUBSUB: "false"
          LOG_GRAPHQL_SUBSCRIPTIONS: "false"
        run: |
          export DATABASE_URL="postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
          node dist/main.js > /tmp/server-smoke.log 2>&1 &
          echo "SERVER_PID=$!" >> "${GITHUB_ENV}"

      - name: Run backend smoke tests
        if: needs.detect.outputs.validate_server == 'true'
        env:
          SERVICE_URL: http://127.0.0.1:3100
        run: bash deploy/cloudrun/tests/validate-post-deploy-smoke.sh

      - name: Show backend logs on failure
        if: failure() && needs.detect.outputs.validate_server == 'true'
        run: cat /tmp/server-smoke.log

      - name: Stop backend
        if: always() && needs.detect.outputs.validate_server == 'true'
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "${SERVER_PID}" || true
            wait "${SERVER_PID}" || true
          fi

      - name: Prepare pruned backend deploy bundle
        if: needs.detect.outputs.validate_server == 'true'
        run: |
          node common/scripts/install-run-rush.js deploy \
            -p server \
            -s server \
            -t common/deploy/server \
            --overwrite

      - name: Build runtime-only backend container
        if: needs.detect.outputs.validate_server == 'true'
        run: docker build --pull -f apps/server/Dockerfile -t local/server-cloudrun:${{ github.sha }} .

  package:
    needs: detect
    if: github.event_name != 'pull_request' && needs.detect.outputs.any_scope == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Verify the committed GraphQL contract snapshot
        if: needs.detect.outputs.deploy_server == 'true'
        run: |
          npm --prefix apps/server run graphql:schema

          if ! git diff --exit-code -- libs/api/schema.gql; then
            echo "GraphQL contract drift detected." >&2
            echo "Regenerate and commit libs/api/schema.gql before deploying." >&2
            git --no-pager diff -- libs/api/schema.gql
            exit 1
          fi

      - name: Lint, test, and build selected release targets
        run: |
          targets=()

          if [[ "${{ needs.detect.outputs.deploy_server }}" == "true" ]]; then
            targets+=(--to server)
          fi

          if [[ "${{ needs.detect.outputs.deploy_webapp }}" == "true" ]]; then
            targets+=(--to webapp)
          fi

          if [[ ${#targets[@]} -eq 0 ]]; then
            echo "No Rush release targets were selected." >&2
            exit 1
          fi

          node common/scripts/install-run-rush.js lint "${targets[@]}"
          node common/scripts/install-run-rush.js test "${targets[@]}"
          node common/scripts/install-run-rush.js build "${targets[@]}"

      - name: Prepare pruned backend deploy bundle
        if: needs.detect.outputs.deploy_server == 'true'
        run: |
          node common/scripts/install-run-rush.js deploy \
            -p server \
            -s server \
            -t common/deploy/server \
            --overwrite

      - name: Archive backend deploy bundle
        if: needs.detect.outputs.deploy_server == 'true'
        run: tar -czf server-deploy.tgz -C common/deploy server

      - name: Upload backend deploy artifact
        if: needs.detect.outputs.deploy_server == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: server-deploy
          path: server-deploy.tgz
          if-no-files-found: error

      - name: Upload webapp deploy artifact
        if: needs.detect.outputs.deploy_webapp == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: webapp-dist
          path: apps/webapp/dist
          if-no-files-found: error

  deploy-server:
    needs:
      - detect
      - package
    if: github.event_name != 'pull_request' && needs.detect.outputs.deploy_server == 'true' && needs.package.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download backend deploy artifact
        uses: actions/download-artifact@v5
        with:
          name: server-deploy
          path: .

      - name: Extract backend deploy artifact
        run: |
          mkdir -p common/deploy
          tar -xzf server-deploy.tgz -C common/deploy

      - name: Confirm required Google Cloud configuration
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_RUN_CORS_ORIGIN: ${{ vars.CLOUD_RUN_CORS_ORIGIN }}
        run: |
          for name in \
            GCP_PROJECT_ID \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            GCP_ARTIFACT_REGISTRY_REPOSITORY \
            CLOUD_RUN_SERVICE \
            CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT \
            CLOUD_RUN_CORS_ORIGIN; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub Actions variable: ${name}" >&2
              exit 1
            fi
          done

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 416.0.0"
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Confirm required Secret Manager entries are readable
        run: |
          for secret_name in DATABASE_URL DATABASE_URL_DIRECT REDIS_URL; do
            gcloud secrets versions access latest \
              --secret "${secret_name}" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              > /dev/null
          done

      - name: Load direct database URL for migrations
        run: |
          secret_value="$(
            gcloud secrets versions access latest \
              --secret=DATABASE_URL_DIRECT \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              | tr -d '\r\n'
          )"
          printf 'DATABASE_URL_DIRECT=%s\n' "${secret_value}" >> "${GITHUB_ENV}"

      - name: Run production database migrations from the deploy artifact
        working-directory: common/deploy/server/apps/server
        env:
          NODE_ENV: production
          DATABASE_URL_DIRECT: ${{ env.DATABASE_URL_DIRECT }}
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "true"
          DATABASE_SSL_REJECT_UNAUTHORIZED: "false"
        run: npm run migration:run:dist

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        env:
          IMAGE_NAME: ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}
        run: |
          docker build --pull -f apps/server/Dockerfile -t "${IMAGE_NAME}" .
          docker push "${IMAGE_NAME}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"

      - id: deploy
        name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ env.CLOUD_RUN_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_NAME }}
          env_vars: |-
            NODE_ENV=production
            HOST=0.0.0.0
            GRAPHQL_PATH=/graphql
            PUBSUB_DRIVER=redis
            DATABASE_SYNCHRONIZE=false
            DATABASE_SSL=true
            DATABASE_SSL_REJECT_UNAUTHORIZED=false
            CORS_ORIGIN=${{ vars.CLOUD_RUN_CORS_ORIGIN }}
            LOG_VERBOSE_PUBSUB=false
            LOG_GRAPHQL_SUBSCRIPTIONS=false
          secrets: |-
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
          flags: >-
            --port=3000
            --service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
            --no-invoker-iam-check
            --min-instances=0
            --max-instances=3
            --concurrency=20
            --timeout=3600

      - name: Run post-deploy backend smoke tests
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: bash deploy/cloudrun/tests/validate-post-deploy-smoke.sh

      - name: Update backend deploy tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f deploy/prod/server "${GITHUB_SHA}"
          git push origin refs/tags/deploy/prod/server --force

  deploy-webapp:
    needs:
      - detect
      - package
      - deploy-server
    if: |
      github.event_name != 'pull_request' &&
      needs.detect.outputs.deploy_webapp == 'true' &&
      needs.package.result == 'success' &&
      (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download webapp deploy artifact
        uses: actions/download-artifact@v5
        with:
          name: webapp-dist
          path: apps/webapp/dist

      - name: Confirm required Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          WEBAPP_VITE_GRAPHQL_HTTP: ${{ vars.WEBAPP_VITE_GRAPHQL_HTTP }}
          WEBAPP_VITE_GRAPHQL_WS: ${{ vars.WEBAPP_VITE_GRAPHQL_WS }}
        run: |
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_PAGES_PROJECT_NAME \
            WEBAPP_VITE_GRAPHQL_HTTP \
            WEBAPP_VITE_GRAPHQL_WS; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required Cloudflare GitHub configuration: ${name}" >&2
              exit 1
            fi
          done

      - name: Deploy webapp to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy apps/webapp/dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=main

      - name: Validate deployed frontend routes
        env:
          WEBAPP_URL: https://${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}.pages.dev
        run: |
          for route in / /info; do
            for attempt in {1..12}; do
              if curl --fail --silent --show-error --location --output /dev/null "${WEBAPP_URL}${route}" > /dev/null; then
                echo "Validated ${WEBAPP_URL}${route}"
                break
              fi

              if [[ "${attempt}" == "12" ]]; then
                echo "Failed to validate ${WEBAPP_URL}${route}" >&2
                exit 1
              fi

              sleep 10
            done
          done

      - name: Update webapp deploy tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f deploy/prod/webapp "${GITHUB_SHA}"
          git push origin refs/tags/deploy/prod/webapp --force
