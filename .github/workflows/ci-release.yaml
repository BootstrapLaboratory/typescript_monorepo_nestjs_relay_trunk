name: ci-release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      force_targets_json:
        default: "[]"
        type: string

permissions:
  contents: read

env:
  CLOUD_RUN_REGION: europe-west4
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEPLOY_ARTIFACT_PREFIX: deploy-target
  DEPLOY_TAG_PREFIX: deploy/prod

concurrency:
  group: ci-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode || steps.plan_manual.outputs.mode }}
      any_scope: ${{ steps.plan.outputs.any_scope || steps.plan_manual.outputs.any_scope }}
      pr_base_sha: ${{ steps.plan.outputs.pr_base_sha || steps.plan_manual.outputs.pr_base_sha }}
      affected_projects_by_target_json: ${{ steps.plan.outputs.affected_projects_by_target_json || steps.plan_manual.outputs.affected_projects_by_target_json }}
      validate_targets_json: ${{ steps.plan.outputs.validate_targets_json || steps.plan_manual.outputs.validate_targets_json }}
      release_targets_json: ${{ steps.plan.outputs.release_targets_json || steps.plan_manual.outputs.release_targets_json }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch remote tags
        run: git fetch --force --tags origin

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - id: plan
        name: Compute Rush release plan
        if: github.event_name != 'workflow_call'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          FORCE_TARGETS_JSON: "[]"
          DEPLOY_TAG_PREFIX: ${{ env.DEPLOY_TAG_PREFIX }}
        run: node scripts/ci/compute-rush-plan.mjs

      - id: plan_manual
        name: Compute Rush release plan
        if: github.event_name == 'workflow_call'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ""
          FORCE_TARGETS_JSON: ${{ inputs.force_targets_json }}
          DEPLOY_TAG_PREFIX: ${{ env.DEPLOY_TAG_PREFIX }}
        run: node scripts/ci/compute-rush-plan.mjs

  validate:
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.any_scope == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatdb
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatuser -d chatdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Verify the committed GraphQL contract snapshot
        if: contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        run: make ci-check-graphql-drift FAILURE_MODE=merge

      - name: Lint affected Rush projects
        run: make ci-validate-lint-affected FROM_SHA="${{ needs.detect.outputs.pr_base_sha }}"

      - name: Test affected Rush projects
        run: make ci-validate-test-affected FROM_SHA="${{ needs.detect.outputs.pr_base_sha }}"

      - name: Build affected Rush projects
        run: make ci-validate-build-affected FROM_SHA="${{ needs.detect.outputs.pr_base_sha }}"

      - name: Run production-like database migrations
        if: contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        env:
          NODE_ENV: production
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: chatdb
          DATABASE_USER: chatuser
          DATABASE_PASSWORD: chatpass
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
        run: make ci-validate-server-migrations

      - name: Start backend with production-like env
        if: contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        env:
          NODE_ENV: production
          HOST: 127.0.0.1
          PORT: "3100"
          GRAPHQL_PATH: /graphql
          CORS_ORIGIN: http://localhost:5173
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: chatdb
          DATABASE_USER: chatuser
          DATABASE_PASSWORD: chatpass
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
          PUBSUB_DRIVER: redis
          REDIS_URL: redis://127.0.0.1:6379
          LOG_VERBOSE_PUBSUB: "false"
          LOG_GRAPHQL_SUBSCRIPTIONS: "false"
        run: make ci-validate-start-server

      - name: Run backend smoke tests
        if: contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        env:
          SERVICE_URL: http://127.0.0.1:3100
        run: make ci-validate-server-smoke SERVICE_URL=http://127.0.0.1:3100

      - name: Show backend logs on failure
        if: failure() && contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        run: make ci-validate-show-server-logs

      - name: Stop backend
        if: always() && contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        run: make ci-validate-stop-server

      - name: Prepare pruned backend deploy bundle
        if: contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        run: make ci-package-server-bundle

      - name: Build runtime-only backend container
        if: contains(fromJSON(needs.detect.outputs.validate_targets_json), 'server')
        run: make ci-validate-build-server-container IMAGE_TAG=local/server-cloudrun:${{ github.sha }}

  package:
    needs: detect
    if: github.event_name != 'pull_request' && needs.detect.outputs.any_scope == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Verify the committed GraphQL contract snapshot
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        run: make ci-check-graphql-drift FAILURE_MODE=deploy

      - name: Lint, test, and build selected release targets
        run: make ci-package-release-targets RELEASE_TARGETS_JSON='${{ needs.detect.outputs.release_targets_json }}'

      - name: Prepare pruned backend deploy bundle
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        run: make ci-package-server-bundle

      - name: Archive backend deploy bundle
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        run: make ci-package-archive-target TARGET=server

      - name: Upload backend deploy artifact
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        uses: actions/upload-artifact@v5
        with:
          name: ${{ format('{0}-{1}', env.DEPLOY_ARTIFACT_PREFIX, 'server') }}
          path: ${{ format('{0}-{1}.tgz', env.DEPLOY_ARTIFACT_PREFIX, 'server') }}
          if-no-files-found: error

      - name: Upload webapp deploy artifact
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'webapp')
        uses: actions/upload-artifact@v5
        with:
          name: ${{ format('{0}-{1}', env.DEPLOY_ARTIFACT_PREFIX, 'webapp') }}
          path: apps/webapp/dist
          if-no-files-found: error

  deploy:
    needs:
      - detect
      - package
    if: needs.package.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Dagger CLI
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="${RUNNER_TEMP}/bin" sh
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Confirm required Google Cloud configuration
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_RUN_CORS_ORIGIN: ${{ vars.CLOUD_RUN_CORS_ORIGIN }}
        run: make ci-deploy-server-check-gcp-config

      - id: auth
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Download backend deploy artifact
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        uses: actions/download-artifact@v5
        with:
          name: ${{ format('{0}-{1}', env.DEPLOY_ARTIFACT_PREFIX, 'server') }}
          path: .

      - name: Confirm required Cloudflare configuration
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'webapp')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          WEBAPP_VITE_GRAPHQL_HTTP: ${{ vars.WEBAPP_VITE_GRAPHQL_HTTP }}
          WEBAPP_VITE_GRAPHQL_WS: ${{ vars.WEBAPP_VITE_GRAPHQL_WS }}
        run: make ci-deploy-webapp-check-config

      - name: Download webapp deploy artifact
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'webapp')
        uses: actions/download-artifact@v5
        with:
          name: ${{ format('{0}-{1}', env.DEPLOY_ARTIFACT_PREFIX, 'webapp') }}
          path: apps/webapp/dist

      - name: Extract backend deploy artifact
        if: contains(fromJSON(needs.detect.outputs.release_targets_json), 'server')
        run: make ci-deploy-extract-target-artifact TARGET=server

      - name: Write Dagger deploy env file
        run: |
          cat > "${RUNNER_TEMP}/dagger-deploy.env" <<'EOF'
          GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
          GCP_ARTIFACT_REGISTRY_REPOSITORY=${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
          CLOUD_RUN_SERVICE=${{ vars.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          CLOUD_RUN_CORS_ORIGIN=${{ vars.CLOUD_RUN_CORS_ORIGIN }}
          CLOUD_RUN_REGION=${{ env.CLOUD_RUN_REGION }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          WEBAPP_VITE_GRAPHQL_HTTP=${{ vars.WEBAPP_VITE_GRAPHQL_HTTP }}
          WEBAPP_VITE_GRAPHQL_WS=${{ vars.WEBAPP_VITE_GRAPHQL_WS }}
          WEBAPP_URL=https://${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}.pages.dev
          GOOGLE_GHA_CREDS_PATH=${{ steps.auth.outputs.credentials_file_path }}
          EOF

      - name: Execute deployment plan
        working-directory: dagger
        env:
          DAGGER_NO_NAG: "1"
          RELEASE_TARGETS_JSON: ${{ needs.detect.outputs.release_targets_json }}
        run: |
          dagger call deploy-release \
            --git-sha="${GITHUB_SHA}" \
            --release-targets-json="${RELEASE_TARGETS_JSON}" \
            --environment=prod \
            --dry-run=false \
            --deploy-env-file="${RUNNER_TEMP}/dagger-deploy.env" \
            --host-workspace-dir="${GITHUB_WORKSPACE}" \
            --docker-socket=/var/run/docker.sock
