name: deploy-cloudflare-pages-webapp

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/deploy-cloudflare-pages-webapp.yaml
      - .github/actions/cached-install/**
      - deploy/cloudflare-pages/scripts/**
      - apps/webapp/**
      - apps/server/**
      - common/**
      - scripts/**
      - package.json
      - rush.json

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: "24"

concurrency:
  group: deploy-cloudflare-pages-webapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-webapp:
    if: |
      vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' &&
      vars.WEBAPP_VITE_GRAPHQL_HTTP != '' &&
      vars.WEBAPP_VITE_GRAPHQL_WS != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Confirm required Cloudflare secrets are configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub Actions secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Build webapp for Cloudflare Pages
        env:
          SKIP_RUSH_INSTALL: "true"
          VITE_GRAPHQL_HTTP: ${{ vars.WEBAPP_VITE_GRAPHQL_HTTP }}
          VITE_GRAPHQL_WS: ${{ vars.WEBAPP_VITE_GRAPHQL_WS }}
          VITE_GRAPHQL_LOG_RECONNECTS: "false"
        run: npm run webapp:build:pages

      - name: Deploy webapp to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy apps/webapp/dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=main

      - name: Show deployed frontend URL
        run: echo "https://${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}.pages.dev"

  smoke-webapp:
    needs: deploy-webapp
    if: needs.deploy-webapp.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployed frontend routes
        env:
          WEBAPP_URL: https://${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}.pages.dev
        run: |
          for route in / /info; do
            for attempt in {1..12}; do
              if curl --fail --silent --show-error --location --output /dev/null "${WEBAPP_URL}${route}" > /dev/null; then
                echo "Validated ${WEBAPP_URL}${route}"
                break
              fi

              if [[ "${attempt}" == "12" ]]; then
                echo "Failed to validate ${WEBAPP_URL}${route}" >&2
                exit 1
              fi

              sleep 10
            done
          done
