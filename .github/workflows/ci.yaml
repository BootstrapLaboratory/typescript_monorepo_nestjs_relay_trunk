name: monorepo-ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  NODE_VERSION: "24" # your runtime
  # NPM_REGISTRY: "https://npm.mycorp.local/" # internal registry
  # NX_CACHE_URL: ${{ secrets.NX_REMOTE_CACHE }} # e.g. Nx Cloud token

jobs:
  # ----------------- 1. Build & test only affected packages -----------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Nx affected build+test (remote cache)
        run: |
          npx nx run-many -t lint test build

  backend-runtime-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatdb
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatuser -d chatdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Build server
        run: npx nx run server:build

      - name: Run database migrations
        working-directory: apps/server
        env:
          NODE_ENV: production
          DATABASE_URL: postgres://chatuser:chatpass@127.0.0.1:5432/chatdb
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
        run: npm run migration:run

      - name: Start backend with production-like env
        working-directory: apps/server
        env:
          NODE_ENV: production
          HOST: 127.0.0.1
          PORT: "3100"
          GRAPHQL_PATH: /graphql
          CORS_ORIGIN: http://localhost:5173
          DATABASE_URL: postgres://chatuser:chatpass@127.0.0.1:5432/chatdb
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
          PUBSUB_DRIVER: redis
          REDIS_URL: redis://127.0.0.1:6379
        run: |
          node dist/main.js > /tmp/server-smoke.log 2>&1 &
          echo "SERVER_PID=$!" >> "${GITHUB_ENV}"

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/health > /tmp/server-health.json; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/server-smoke.log
          exit 1

      - name: Smoke test GraphQL query
        run: |
          curl -fsS \
            -H 'content-type: application/json' \
            --data '{"query":"query { getMessages { id author body } }"}' \
            http://127.0.0.1:3100/graphql > /tmp/server-graphql.json
          node -e "const fs=require('fs'); const parsed=JSON.parse(fs.readFileSync('/tmp/server-graphql.json','utf8')); if (parsed.errors || !parsed.data || !Array.isArray(parsed.data.getMessages)) { console.error(JSON.stringify(parsed, null, 2)); process.exit(1); }"

      - name: Show backend logs on failure
        if: failure()
        run: cat /tmp/server-smoke.log

      - name: Stop backend
        if: always()
        run: |
          if [ -n "${SERVER_PID}" ]; then
            kill "${SERVER_PID}" || true
            wait "${SERVER_PID}" || true
          fi

  backend-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build backend Cloud Run image
        run: |
          docker build --pull -f apps/server/Dockerfile -t local/server-cloudrun:${{ github.sha }} .

