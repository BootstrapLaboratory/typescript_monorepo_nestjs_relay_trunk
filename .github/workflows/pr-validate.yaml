name: pr-validate

on:
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Rush Delivery validation
        uses: BootstrapLaboratory/rush-delivery@v0.5.0
        with:
          entrypoint: validate
          toolchain-image-provider: github
          rush-cache-provider: github
