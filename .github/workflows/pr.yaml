name: pull-request-checks

on:
  pull_request:
    paths:
      - .github/workflows/pr.yaml
      - .github/actions/cached-install/**
      - apps/**
      - common/**
      - deploy/**
      - scripts/**
      - package.json
      - rush.json
      - .dockerignore

permissions:
  contents: read

env:
  NODE_VERSION: "24"

concurrency:
  group: pull-request-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Lint client
        working-directory: apps/client
        run: npm run lint

      - name: Lint server
        working-directory: apps/server
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Run server unit tests
        working-directory: apps/server
        run: npm test -- --runInBand

      - name: Build client
        run: node common/scripts/install-run-rush.js build --to client

      - name: Build server
        run: node common/scripts/install-run-rush.js build --to server

  backend-runtime-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatdb
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatuser -d chatdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup NodeJS version ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies with caching
        uses: ./.github/actions/cached-install

      - name: Build server
        run: node common/scripts/install-run-rush.js build --to server

      - name: Run production database migrations
        working-directory: apps/server
        env:
          NODE_ENV: production
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: chatdb
          DATABASE_USER: chatuser
          DATABASE_PASSWORD: chatpass
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
        run: |
          export DATABASE_URL="postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
          npm run migration:run

      - name: Start backend with production-like env
        working-directory: apps/server
        env:
          NODE_ENV: production
          HOST: 127.0.0.1
          PORT: "3100"
          GRAPHQL_PATH: /graphql
          CORS_ORIGIN: http://localhost:5173
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: chatdb
          DATABASE_USER: chatuser
          DATABASE_PASSWORD: chatpass
          DATABASE_SYNCHRONIZE: "false"
          DATABASE_SSL: "false"
          PUBSUB_DRIVER: redis
          REDIS_URL: redis://127.0.0.1:6379
          LOG_VERBOSE_PUBSUB: "false"
          LOG_GRAPHQL_SUBSCRIPTIONS: "false"
        run: |
          export DATABASE_URL="postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
          node dist/main.js > /tmp/server-smoke.log 2>&1 &
          echo "SERVER_PID=$!" >> "${GITHUB_ENV}"

      - name: Run backend smoke tests
        env:
          SERVICE_URL: http://127.0.0.1:3100
        run: bash deploy/cloudrun/tests/validate-post-deploy-smoke.sh

      - name: Regenerate Relay artifacts
        working-directory: apps/client
        run: npm run relay

      - name: Ensure committed GraphQL schema and Relay artifacts are up to date
        run: |
          git diff --exit-code -- apps/server/__generated__/schema.gql apps/client/src/components/chat/__generated__

      - name: Show backend logs on failure
        if: failure()
        run: cat /tmp/server-smoke.log

      - name: Stop backend
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "${SERVER_PID}" || true
            wait "${SERVER_PID}" || true
          fi

  backend-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Build backend Cloud Run image
        run: docker build --pull -f apps/server/Dockerfile -t local/server-cloudrun:${{ github.sha }} .
