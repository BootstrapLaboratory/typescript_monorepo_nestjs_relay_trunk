# yaml-language-server: $schema=https://bootstraplaboratory.github.io/rush-delivery/schemas/v0.4.1/rush-cache-providers.schema.json

cache:
  version: v1
  paths:
    - common/temp/install-run
    - common/temp/node_modules
    - common/temp/pnpm-store
providers:
  github:
    kind: github_container_registry
    registry: ghcr.io
    image_namespace: rush-delivery-caches
    repository_env: GITHUB_REPOSITORY
    token_env: GITHUB_TOKEN
    username_env: GITHUB_ACTOR
