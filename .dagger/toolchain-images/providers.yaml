# yaml-language-server: $schema=https://bootstraplaboratory.github.io/rush-delivery/schemas/toolchain-image-providers.schema.json

providers:
  github:
    kind: github_container_registry
    registry: ghcr.io
    image_namespace: rush-delivery-toolchains
    repository_env: GITHUB_REPOSITORY
    token_env: GITHUB_TOKEN
    username_env: GITHUB_ACTOR
