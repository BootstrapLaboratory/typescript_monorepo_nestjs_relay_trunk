# yaml-language-server: $schema=https://bootstraplaboratory.github.io/rush-delivery/schemas/v0.5.0/package-target.schema.json

name: webapp

artifact:
  kind: directory
  path: apps/webapp/dist

build:
  map_env:
    DOCS_APP_URL: WEBAPP_URL
    DOCS_SITE_URL: WEBAPP_URL
    VITE_GRAPHQL_HTTP: WEBAPP_VITE_GRAPHQL_HTTP
    VITE_GRAPHQL_WS: WEBAPP_VITE_GRAPHQL_WS

  dry_run_defaults:
    WEBAPP_URL: https://webapp.pages.dev
    WEBAPP_VITE_GRAPHQL_HTTP: https://api.example.invalid/graphql
    WEBAPP_VITE_GRAPHQL_WS: wss://api.example.invalid/graphql
