# yaml-language-server: $schema=https://bootstraplaboratory.github.io/rush-delivery/schemas/deploy-target.schema.json

name: server
deploy_script: deploy/cloudrun/scripts/deploy-server.sh

runtime:
  image: node:24-bookworm-slim
  workspace:
    dirs:
      - common/deploy/server
      - deploy/cloudrun/scripts
      - deploy/cloudrun/tests
    files:
      - apps/server/Dockerfile

  install:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl gnupg git
    - install -d -m 0755 /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - chmod a+r /etc/apt/keyrings/docker.gpg
    - . /etc/os-release && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian ${VERSION_CODENAME} stable" > /etc/apt/sources.list.d/docker.list
    - curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /etc/apt/keyrings/google-cloud-cli.gpg
    - echo "deb [signed-by=/etc/apt/keyrings/google-cloud-cli.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
    - apt-get update
    - apt-get install -y --no-install-recommends docker-buildx-plugin docker-ce-cli google-cloud-cli
    - rm -rf /var/lib/apt/lists/*

  pass_env:
    - CLOUD_RUN_CORS_ORIGIN
    - CLOUD_RUN_REGION
    - CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT
    - CLOUD_RUN_SERVICE
    - GCP_ARTIFACT_REGISTRY_REPOSITORY
    - GCP_PROJECT_ID

  env:
    CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: /runtime-files/gcp-credentials.json
    DOCKER_HOST: unix:///var/run/docker.sock
    GOOGLE_APPLICATION_CREDENTIALS: /runtime-files/gcp-credentials.json
    GOOGLE_GHA_CREDS_PATH: /runtime-files/gcp-credentials.json

  dry_run_defaults:
    CLOUD_RUN_CORS_ORIGIN: https://example.invalid
    CLOUD_RUN_REGION: europe-west4
    CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: dry-run-runtime@example.invalid
    CLOUD_RUN_SERVICE: server
    GCP_ARTIFACT_REGISTRY_REPOSITORY: dry-run-repository
    GCP_PROJECT_ID: dry-run-project

  file_mounts:
    - source: gcp-credentials.json
