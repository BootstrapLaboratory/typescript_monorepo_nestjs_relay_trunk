# yaml-language-server: $schema=https://bootstraplaboratory.github.io/rush-delivery/schemas/v0.4.1/deploy-target.schema.json

name: webapp
deploy_script: deploy/cloudflare-pages/scripts/deploy-webapp.sh

runtime:
  image: node:24-bookworm-slim
  workspace:
    dirs:
      - apps/webapp/dist
      - deploy/cloudflare-pages/scripts

  install:
    - apt-get update
    - apt-get install -y git

  pass_env:
    - CLOUDFLARE_ACCOUNT_ID
    - CLOUDFLARE_API_TOKEN
    - CLOUDFLARE_PAGES_PROJECT_NAME
    - WEBAPP_URL
    - VITE_GRAPHQL_HTTP
    - VITE_GRAPHQL_WS
    - WEBAPP_VITE_GRAPHQL_HTTP
    - WEBAPP_VITE_GRAPHQL_WS

  dry_run_defaults:
    CLOUDFLARE_ACCOUNT_ID: dry-run-account
    # trunk-ignore(checkov/CKV_SECRET_6)
    CLOUDFLARE_API_TOKEN: dry-run-token
    CLOUDFLARE_PAGES_PROJECT_NAME: webapp
    WEBAPP_URL: https://webapp.pages.dev
    VITE_GRAPHQL_HTTP: https://api.example.invalid/graphql
    VITE_GRAPHQL_WS: wss://api.example.invalid/graphql
    WEBAPP_VITE_GRAPHQL_HTTP: https://api.example.invalid/graphql
    WEBAPP_VITE_GRAPHQL_WS: wss://api.example.invalid/graphql
