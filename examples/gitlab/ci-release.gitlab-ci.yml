stages:
  - release

variables:
  CLOUD_RUN_REGION: europe-west4
  DAGGER_NO_NAG: "1"
  DEPLOY_ARTIFACT_PREFIX: deploy-target
  RUSH_DELIVERY_MODULE: github.com/BootstrapLaboratory/rush-delivery@v0.4.1

.with_dagger:
  before_script:
    - mkdir -p "${CI_PROJECT_DIR}/.bin"
    - curl -fsSL https://dl.dagger.io/dagger/install.sh | BIN_DIR="${CI_PROJECT_DIR}/.bin" sh
    - export PATH="${CI_PROJECT_DIR}/.bin:${PATH}"

release:
  stage: release
  extends: .with_dagger
  script:
    - mkdir -p "${CI_PROJECT_DIR}/.dagger/runtime-files"
    - |
      if [[ -n "${GCP_CREDENTIALS_FILE:-}" ]]; then
        cp "${GCP_CREDENTIALS_FILE}" "${CI_PROJECT_DIR}/.dagger/runtime-files/gcp-credentials.json"
      fi
    - |
      cat > "${CI_PROJECT_DIR}/.dagger/deploy.env" <<EOF
      SOURCE_AUTH_TOKEN=${SOURCE_AUTH_TOKEN}
      GCP_PROJECT_ID=${GCP_PROJECT_ID}
      GCP_ARTIFACT_REGISTRY_REPOSITORY=${GCP_ARTIFACT_REGISTRY_REPOSITORY}
      CLOUD_RUN_SERVICE=${CLOUD_RUN_SERVICE}
      CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT=${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT}
      CLOUD_RUN_CORS_ORIGIN=${CLOUD_RUN_CORS_ORIGIN}
      CLOUD_RUN_REGION=${CLOUD_RUN_REGION}
      CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_PAGES_PROJECT_NAME=${CLOUDFLARE_PAGES_PROJECT_NAME}
      WEBAPP_VITE_GRAPHQL_HTTP=${WEBAPP_VITE_GRAPHQL_HTTP}
      WEBAPP_VITE_GRAPHQL_WS=${WEBAPP_VITE_GRAPHQL_WS}
      VITE_GRAPHQL_HTTP=${WEBAPP_VITE_GRAPHQL_HTTP}
      VITE_GRAPHQL_WS=${WEBAPP_VITE_GRAPHQL_WS}
      WEBAPP_URL=${WEBAPP_URL}
      GITHUB_ACTOR=gitlab-ci
      GITHUB_REPOSITORY=${CI_PROJECT_PATH}
      GITHUB_TOKEN=${SOURCE_AUTH_TOKEN}
      EOF
    - |
      dagger -m "${RUSH_DELIVERY_MODULE}" call workflow \
        --git-sha="${CI_COMMIT_SHA}" \
        --event-name="${CI_PIPELINE_SOURCE}" \
        --force-targets-json="${FORCE_TARGETS_JSON:-[]}" \
        --deploy-tag-prefix=deploy/prod \
        --artifact-prefix="${DEPLOY_ARTIFACT_PREFIX}" \
        --environment=prod \
        --dry-run=false \
        --deploy-env-file="${CI_PROJECT_DIR}/.dagger/deploy.env" \
        --toolchain-image-provider=off \
        --rush-cache-provider=off \
        --source-mode=git \
        --source-repository-url="${SOURCE_REPOSITORY_URL}" \
        --source-ref="${CI_COMMIT_REF_NAME}" \
        --source-auth-token-env=SOURCE_AUTH_TOKEN \
        --source-auth-username=gitlab-ci-token \
        --runtime-files="${CI_PROJECT_DIR}/.dagger/runtime-files" \
        --docker-socket=/var/run/docker.sock
